name: Build and Publish Docker Image

on:
  push:
    branches:
      - master
    paths:
      - "pyproject.toml"

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: check
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          PREV_VERSION=""
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            PREV_VERSION=$(git show "$BEFORE_SHA:pyproject.toml" 2>/dev/null | python -c "import sys, tomllib; print(tomllib.load(sys.stdin.buffer)['project']['version'])" 2>/dev/null || echo "")
          fi
          echo "Previous version: '$PREV_VERSION'"
          echo "Current version: '${{ steps.version.outputs.version }}'"
          if [ "$PREV_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push git tag
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Log in to Docker Hub
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_CI_SECRET }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/telegramircrr:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/telegramircrr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync README to Docker Hub description
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_CI_SECRET }}
          repository: ${{ secrets.DOCKER_HUB_USERNAME }}/telegramircrr

      - name: Create GitHub Release
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
